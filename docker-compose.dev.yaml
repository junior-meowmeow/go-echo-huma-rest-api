services:
  api-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: go-echo-huma-dev
    volumes:
      - .:/app
    ports:
      - ${PORT}:${PORT}
    depends_on:
      - mongo
    networks:
      - app-network
    environment:
      PORT:
      API_BASE_PATH:
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_USER:
      MONGO_PASS:
      DB_NAME:
      DB_USER:
      DB_PASS:
      AWS_REGION:
      AWS_ACCESS_KEY_ID:
      AWS_SECRET_ACCESS_KEY:
      AWS_SESSION_TOKEN:
      S3_ENDPOINT:
      S3_BUCKET:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:8.0
    restart: always
    ports:
      - ${MONGO_PORT}:27017
    networks:
      - app-network
      - mongo-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${DB_NAME}
      MONGO_INITDB_USERNAME: ${DB_USER}
      MONGO_INITDB_PASSWORD: ${DB_PASS}
    volumes:
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - ${MONGO_EXPRESS_PORT}:8081
    networks:
      - mongo-network
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS}
    depends_on:
      - mongo

volumes:
  mongo-data:

networks:
  app-network:
    name: app-network
    driver: bridge
  mongo-network:
    name: mongo-network
    driver: bridge
